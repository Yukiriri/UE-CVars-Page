<!DOCTYPE HTML>
<html>
<head>
    <title>Unreal Engine Console Variables and Commands</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="https://www.unrealengine.com/cosmos/static/favicons/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="https://www.unrealengine.com/cosmos/static/favicons/favicon.svg">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="stylesheet" href="./css/bgimg.css">
    <script src="./js/cvars/en/5.8.0.js"></script>
    <script src="./js/cvars/en/5.7.4.js"></script>
    <script src="./js/cvars/en/5.6.1.js"></script>
    <script src="./js/cvars/en/5.5.4.js"></script>
    <script src="./js/cvars/en/5.4.4.js"></script>
    <script src="./js/cvars/en/5.3.2.js"></script>
    <script src="./js/cvars/en/5.2.1.js"></script>
    <script src="./js/cvars/en/5.1.1.js"></script>
    <script src="./js/cvars/en/5.0.3.js"></script>
    <script src="./js/cvars/en/4.27.2.js"></script>
    <script src="./js/cvars/en/4.26.2.js"></script>
    <script src="./js/interaction.js" defer></script>
</head>
<body>
    <div class="bg-img">
        <div class="bg-mask"></div>
    </div>
    <div class="main h-center">
        <!-- <div class="topbar card card-mask h-fill">
        </div> -->
        <div class="content h-fill">
            <div>
                <div class="card card-mask">
                    <div class="listbox">
                        <div class="header">UE Version</div>
                        <div class="items" id="id-ver-list"></div>
                    </div>
                </div>
                <div class="card card-mask">
                    <div class="listbox">
                        <div class="header">Popular CVar</div>
                        <div class="items" id="id-preset-list"></div>
                    </div>
                </div>
            </div>
            <div>
                <div class="searchbox card card-mask h-fill">
                    <input type="text" placeholder="Search" id="id-search-pattern">
                </div>
                <div class="card card-mask">
                    <div class="listbox">
                        <div class="items" id="id-result-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
